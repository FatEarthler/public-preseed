if [ x$feature_default_font_path = xy ] ; then
   font=unicode
else
   font=$prefix/font.pf2
fi

if loadfont $font ; then
  # Auto mode is safe in Kali as we use percentage based layout in the theme
  set gfxmode=auto
  set gfxpayload=keep
  insmod efi_gop
  insmod efi_uga
  insmod video_bochs
  insmod video_cirrus
  insmod gfxterm
  insmod png
  terminal_output gfxterm
fi

if background_image /isolinux/splash.png; then
  set color_normal=light-gray/black
  set color_highlight=white/black
elif background_image /splash.png; then
  set theme=$prefix/theme.txt
else
  set menu_color_normal=cyan/blue
  set menu_color_highlight=white/blue
fi

insmod play
play 960 440 1 0 4 440 1
set theme=/boot/grub/theme/1
menuentry --hotkey=i 'Install' {
    set background_color=black
    linux    /install.amd/vmlinuz ipv6.disable=1 auto=true priority=critical url=https://raw.githubusercontent.com/FatEarthler/public-preseed/refs/heads/main/preseedminiUEFI.cfg netcfg/choose_interface=auto --- quiet 
    initrd   /install.amd/initrd.gz
}
